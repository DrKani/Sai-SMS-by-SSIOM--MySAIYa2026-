  <style>
    body {
      background-color: #FDFBF7;

      font-family: 'Poppins', sans-serif;

    .font-playfair {

    .font-poppins {

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      /* Minimum font size for elderly UX */
    }

    /* Accessibility: Touch Targets >= 44px */
    button,
    a,
    input[type="submit"],
    input[type="button"],
    select {

    }

    /* Accessibility: Prevent iOS zoom and ensure comfortable reading */
    input,
    textarea,

    /* Hide scrollbar for standard scrolling items */
    .hide-scrollbar::-webkit-scrollbar {

    }

    .hide-scrollbar {

      /* IE and Edge */

      /* Firefox */

    .text-gold-gradient {
      background: linear-gradient(90deg, #D2AC47 5%, #F7EF8A 45%, #AE8625 85%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .animate-marquee {
      display: inline-block;
      animation: marquee 40s linear infinite;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #002E5B;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #D2AC47;
    }

    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #FDFBF7;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(210, 172, 71, 0.3);
      border-radius: 50%;
      border-top-color: #D2AC47;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      color: #002E5B;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 1.2rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
